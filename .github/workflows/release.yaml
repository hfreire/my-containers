name: Release

on:
  push:
    branches:
      - master
    paths:
      - "apps/**"
  workflow_dispatch:
    inputs:
      app:
        description: "App to build (e.g. node-red-mcp)"
        required: true
        type: string

jobs:
  changed:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changed.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'apps=["${{ inputs.app }}"]' >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- apps/ \
              | cut -d'/' -f2 \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "apps=${CHANGED}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.app }} (${{ matrix.platform }})
    needs: changed
    if: needs.changed.outputs.apps != '[]'
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.changed.outputs.apps) }}
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata from docker-bake.hcl
        id: meta
        working-directory: apps/${{ matrix.app }}
        run: |
          VERSION=$(docker buildx bake --print 2>/dev/null | jq -r '.target.image.args.VERSION')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.title=${{ matrix.app }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.app }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:buildcache-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:buildcache-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.app }}-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests for ${{ matrix.app }}
    needs:
      - changed
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.changed.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        working-directory: apps/${{ matrix.app }}
        run: |
          VERSION=$(docker buildx bake --print 2>/dev/null | jq -r '.target.image.args.VERSION')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.app }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:rolling" \
            $(printf "${IMAGE}@sha256:%s " *)
